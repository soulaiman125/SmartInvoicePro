# Render blueprint for the SmartInvoice Pro API.
# Render → New → Blueprint → point at this repo. Builds the backend Docker image
# (which runs `prisma migrate deploy` on boot via docker-entrypoint.sh).
#
# DATABASE_URL is intentionally not generated here so you can point it at a
# managed Neon PostgreSQL instance. To use Render's own Postgres instead,
# uncomment the `databases:` block and set DATABASE_URL.fromDatabase.
services:
  - type: web
    name: smartinvoice-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Paste your Neon connection string (with ?sslmode=require) in the dashboard.
      - key: DATABASE_URL
        sync: false
      # The deployed frontend origin (Vercel URL) for CORS.
      - key: CLIENT_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: RESET_TOKEN_TTL_MINUTES
        value: 60
      - key: PORTAL_TOKEN_TTL_DAYS
        value: 90
      # Email (optional — leave SMTP_HOST unset to use the dev/preview transport).
      - key: MAIL_FROM
        value: SmartInvoice Pro <no-reply@smartinvoice.pro>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

# databases:
#   - name: smartinvoice-db
#     plan: starter
#     databaseName: smartinvoice
#     # then set the service's DATABASE_URL to:
#     #   fromDatabase: { name: smartinvoice-db, property: connectionString }
